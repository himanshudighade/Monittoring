name: Python Flask CI Pipeline

on:
  push:
    branches: [ main ]

  pull_request:
    branches: [ main ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@v4


    - name: Setup Python
      uses: actions/setup-python@v5

      with:
        python-version: "3.10"


    - name: Install dependencies
      run: |

        python -m pip install --upgrade pip

        pip install -r requirements.txt


    - name: Check python syntax
      run: |

        python -m py_compile app.py
        python -m py_compile monitor.py
        python -m py_compile alerts.py
        python -m py_compile scheduler.py
        python -m py_compile notifier.py
        python -m py_compile report_logger.py


    - name: Test system health function
      run: |

        python - <<EOF
from monitor import get_system_health
print(get_system_health())
EOF


    - name: CI/CD Success
      run: echo "Build Passed Successfully"
